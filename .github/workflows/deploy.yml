name: Deploy

on:
  push:
    branches:
      - main  # 或者 master，确认你的默认分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true  # 重要：如果主题是子模块
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        # 如果主题需要单独安装
        # npm install hexo-theme-butterfly --save
        
    - name: Setup Hexo
      run: |
        npx hexo clean
        npx hexo generate
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        personal_token: ${{ secrets.PERSONAL_TOKEN }}
        external_repository: wp-a/wp-a.github.io  # 替换为你的实际仓库名
        publish_dir: ./public
        publish_branch: main
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'