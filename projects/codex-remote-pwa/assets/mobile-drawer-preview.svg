  <g transform="translate(88 812)">
    <rect width="250" height="40" rx="20" fill="#15202C"/>
    <text x="22" y="26" fill="#F8FAFC" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">会话切换更明显</text>
    <text x="138" y="26" fill="#CBD5E1" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">但不占主聊天区</text>
  </g>
