<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="58" x2="1180" y2="842" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EFE6"/>
      <stop offset="1" stop-color="#E5EDF3"/>
    </linearGradient>
    <linearGradient id="drawer" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F8F5EE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1EB8A7"/>
      <stop offset="1" stop-color="#0E7B76"/>
    </linearGradient>
    <filter id="drawer-shadow" x="70" y="74" width="676" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <filter id="panel-shadow" x="542" y="198" width="598" height="482" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="900" rx="40" fill="#11161C"/>
  <rect x="32" y="32" width="1216" height="836" rx="34" fill="url(#bg)"/>
  <rect x="32" y="32" width="1216" height="836" rx="34" fill="#11161C" fill-opacity="0.08"/>
  <circle cx="1120" cy="132" r="122" fill="#DBEEE7"/>
  <circle cx="188" cy="786" r="142" fill="#E5D9CA"/>

  <text x="88" y="120" fill="#152039" font-size="52" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">会话切换抽屉</text>
  <text x="88" y="168" fill="#4B5B71" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">更像真实截图的展示方式：把重操作收进抽屉，而不是解释抽屉。</text>

  <g filter="url(#panel-shadow)" opacity="0.52">
    <rect x="604" y="246" width="488" height="384" rx="34" fill="#FFFFFF"/>
    <rect x="640" y="280" width="164" height="16" rx="8" fill="#DCE3EA"/>
    <rect x="640" y="318" width="248" height="16" rx="8" fill="#CCD5DE"/>
    <rect x="640" y="380" width="224" height="84" rx="28" fill="#FFFFFF"/>
    <rect x="880" y="484" width="186" height="80" rx="28" fill="#EAF6F2"/>
  </g>

  <g filter="url(#drawer-shadow)">
