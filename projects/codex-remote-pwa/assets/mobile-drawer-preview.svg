    <text x="146" y="170" fill="#9AA8BB" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.14em">CODEX REMOTE</text>
    <text x="146" y="220" fill="#0F172A" font-size="40" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">会话切换</text>
    <rect x="630" y="146" width="50" height="32" rx="16" fill="#E3E9F0"/>
    <text x="645" y="168" fill="#556579" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">关闭</text>

    <rect x="138" y="252" width="540" height="114" rx="28" fill="#FFFFFF"/>
    <text x="168" y="292" fill="#9AA8BB" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.12em">当前会话</text>
    <text x="168" y="330" fill="#0F172A" font-size="32" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">README 和 onboarding 优化</text>
    <text x="168" y="356" fill="#64748B" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">/workspace/codex-remote-pwa</text>
    <rect x="564" y="294" width="84" height="30" rx="15" fill="#DDF5ED"/>
    <text x="588" y="313" fill="#0F766E" font-size="14" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">空闲</text>

    <text x="138" y="430" fill="#0F172A" font-size="30" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">最近的 Codex</text>
    <text x="508" y="430" fill="#64748B" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">继续已有 thread</text>

    <rect x="138" y="462" width="540" height="92" rx="24" fill="#FFFFFF"/>
    <text x="168" y="500" fill="#0F172A" font-size="23" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">修复 README 图片布局</text>
    <text x="168" y="530" fill="#64748B" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">/workspace/codex-remote-pwa</text>
    <text x="610" y="513" fill="#0F766E" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">继续</text>

    <rect x="138" y="570" width="540" height="92" rx="24" fill="#FFFFFF"/>
    <text x="168" y="608" fill="#0F172A" font-size="23" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">补齐 app-server runtime</text>
    <text x="168" y="638" fill="#64748B" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">/workspace/codex-remote-pwa</text>
    <text x="610" y="621" fill="#2D5DE1" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">打开</text>

    <rect x="138" y="680" width="540" height="92" rx="24" fill="#E9F6F2"/>
    <text x="168" y="718" fill="#0F172A" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">手机打开链接</text>
    <text x="168" y="748" fill="#64748B" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">把当前连接发到手机上，页面会自动带上连接密码。</text>
    <rect x="168" y="734" width="0" height="0" fill="transparent"/>
    <rect x="168" y="746" width="320" height="14" rx="7" fill="#FFFFFF"/>
    <rect x="522" y="732" width="124" height="36" rx="18" fill="url(#accent)"/>
    <text x="556" y="756" fill="#ECFEFF" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">复制链接</text>
