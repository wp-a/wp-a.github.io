<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="84" y1="64" x2="1190" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1E7"/>
      <stop offset="1" stop-color="#E5EDF3"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFEFB"/>
      <stop offset="1" stop-color="#F7F3EC"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#141B22"/>
      <stop offset="1" stop-color="#0F151B"/>
    </linearGradient>
    <linearGradient id="user" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#202932"/>
      <stop offset="1" stop-color="#2E3945"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1FB9A8"/>
      <stop offset="1" stop-color="#0F7E77"/>
    </linearGradient>
    <filter id="phone-shadow" x="152" y="118" width="456" height="708" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
    <filter id="echo-shadow" x="520" y="176" width="568" height="524" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="900" rx="40" fill="#11161C"/>
  <rect x="32" y="32" width="1216" height="836" rx="34" fill="url(#bg)"/>
  <circle cx="182" cy="176" r="110" fill="#E8DDCD"/>
  <circle cx="1120" cy="120" r="118" fill="#DDEFE8"/>

  <text x="88" y="120" fill="#152039" font-size="52" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">聊天主界面</text>
  <text x="88" y="168" fill="#4B5B71" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">更接近真实手机截图的展示方式：主视区几乎全部留给聊天流。</text>

  <g filter="url(#echo-shadow)" opacity="0.68">
    <rect x="580" y="236" width="448" height="404" rx="36" fill="#FFFFFF" fill-opacity="0.68"/>
    <rect x="622" y="286" width="166" height="16" rx="8" fill="#DDE3EA"/>
    <rect x="622" y="318" width="260" height="16" rx="8" fill="#CBD4DE"/>
    <rect x="622" y="372" width="178" height="74" rx="24" fill="#EAEFF3"/>
    <rect x="818" y="470" width="180" height="84" rx="28" fill="#FFFFFF"/>
    <rect x="622" y="580" width="332" height="42" rx="21" fill="#FFFFFF"/>
    <circle cx="974" cy="601" r="17" fill="url(#accent)"/>
  </g>

  <g filter="url(#phone-shadow)">
    <rect x="194" y="150" width="372" height="644" rx="48" fill="url(#shell)"/>
    <rect x="212" y="168" width="336" height="608" rx="34" fill="url(#phone)"/>
    <rect x="320" y="182" width="120" height="14" rx="7" fill="#D3D9E0"/>

    <rect x="236" y="214" width="288" height="76" rx="24" fill="#FFFFFF" fill-opacity="0.74"/>
    <circle cx="264" cy="252" r="15" fill="#FFFFFF"/>
    <rect x="258" y="246" width="12" height="12" rx="6" fill="#162128"/>
    <rect x="247" y="262" width="34" height="4" rx="2" fill="#162128"/>
    <text x="292" y="238" fill="#95A3B6" font-size="14" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.12em">当前会话</text>
    <text x="292" y="268" fill="#0F172A" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">README 和 onboarding 优化</text>
    <rect x="292" y="274" width="82" height="24" rx="12" fill="#DDF5ED"/>
    <text x="316" y="290" fill="#0F766E" font-size="13" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">空闲</text>

    <rect x="250" y="334" width="178" height="82" rx="26" fill="url(#user)"/>
    <text x="274" y="372" fill="#F8FAFC" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">请对照竞品，</text>
    <text x="274" y="398" fill="#F8FAFC" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">把项目再优化一轮。</text>

    <circle cx="264" cy="470" r="18" fill="#15202C"/>
    <text x="257" y="477" fill="#FFFFFF" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">C</text>
    <rect x="296" y="442" width="206" height="112" rx="28" fill="#FFFFFF"/>
    <text x="320" y="476" fill="#0F172A" font-size="17" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">这轮重点补两件事：</text>
    <text x="320" y="506" fill="#475569" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">- 更低摩擦的手机打开链接</text>
    <text x="320" y="530" fill="#475569" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">- 更清晰的竞品定位和图示</text>

    <rect x="236" y="714" width="288" height="44" rx="22" fill="#FFFFFF"/>
    <rect x="248" y="726" width="208" height="20" rx="10" fill="#F6F2EA"/>
    <text x="264" y="740" fill="#90A0B5" font-size="15" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">继续这个会话，告诉 Codex 你想做什么…</text>
    <circle cx="496" cy="736" r="18" fill="url(#accent)"/>
    <path d="M489 736H503" stroke="#ECFEFF" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M496 729L503 736L496 743" stroke="#ECFEFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(88 780)">
    <rect width="214" height="40" rx="20" fill="#15202C"/>
    <text x="22" y="26" fill="#F8FAFC" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">聊天流优先</text>
    <text x="116" y="26" fill="#CBD5E1" font-size="16" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">接近真实体验</text>
  </g>
