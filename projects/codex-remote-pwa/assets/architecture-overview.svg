<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="120" y1="60" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#E9F0F4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F7F3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <filter id="soft-shadow" x="-40" y="-40" width="560" height="620" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="card-shadow" x="-40" y="-40" width="470" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#1E293B"/>
    </marker>
  </defs>

  <rect width="1600" height="960" rx="48" fill="#0F141A"/>
  <rect x="34" y="34" width="1532" height="892" rx="40" fill="url(#page)"/>
  <circle cx="1378" cy="170" r="138" fill="#DCEFE8"/>
  <circle cx="184" cy="796" r="156" fill="#E9E1D4"/>

  <text x="110" y="136" fill="#0F172A" font-size="58" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Codex Remote PWA 架构概览</text>
  <text x="110" y="190" fill="#475569" font-size="26" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">本地 Codex 会话仍留在你的电脑上，</text>
  <text x="110" y="226" fill="#475569" font-size="26" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">手机只处理继续对话、切换会话和关键状态。</text>

  <g filter="url(#soft-shadow)" transform="translate(104 256)">
    <rect width="344" height="500" rx="34" fill="url(#panel)"/>
    <text x="34" y="56" fill="#94A3B8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.14em">入口层</text>
    <text x="34" y="104" fill="#0F172A" font-size="34" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">手机浏览器 / PWA</text>
    <text x="34" y="144" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">移动控制台，而不是远程桌面窗口。</text>

    <rect x="34" y="190" width="274" height="214" rx="28" fill="#0F172A"/>
    <rect x="54" y="210" width="234" height="174" rx="22" fill="#FFFDF9"/>
    <rect x="122" y="224" width="98" height="14" rx="7" fill="#D6DAE0"/>
    <text x="74" y="278" fill="#94A3B8" font-size="14" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.14em">当前会话</text>
    <text x="74" y="312" fill="#0F172A" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">修复移动端体验</text>
    <rect x="74" y="328" width="92" height="28" rx="14" fill="#DDF5ED"/>
    <text x="102" y="347" fill="#0F766E" font-size="14" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">运行中</text>
    <rect x="74" y="366" width="158" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="236" y="366" width="26" height="10" rx="5" fill="#0F766E"/>

    <g transform="translate(34 436)">
      <circle cx="8" cy="8" r="8" fill="#0F766E"/>
      <text x="26" y="14" fill="#334155" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">继续同一个本地 thread</text>
      <circle cx="8" cy="52" r="8" fill="#0F766E"/>
      <text x="26" y="58" fill="#334155" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">查看最后输出和授权状态</text>
    </g>
  </g>

  <g filter="url(#soft-shadow)" transform="translate(554 256)">
    <rect width="418" height="500" rx="34" fill="url(#panel)"/>
    <text x="38" y="56" fill="#94A3B8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.14em">控制平面</text>
    <text x="38" y="104" fill="#0F172A" font-size="38" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Bridge Server</text>
    <text x="38" y="144" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">REST + WebSocket + SQLite</text>

    <rect x="38" y="188" width="150" height="42" rx="21" fill="#DCFCE7"/>
    <text x="72" y="215" fill="#166534" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Session Store</text>
    <rect x="200" y="188" width="168" height="42" rx="21" fill="#DBEAFE"/>
    <text x="236" y="215" fill="#1D4ED8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Runtime Router</text>

    <rect x="38" y="258" width="342" height="24" rx="12" fill="#E2E8F0"/>
    <rect x="38" y="258" width="214" height="24" rx="12" fill="url(#accent)"/>
    <text x="38" y="326" fill="#0F172A" font-size="24" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">统一三件事</text>
    <text x="38" y="368" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">1. Session / Run / Event 持久化</text>
    <text x="38" y="404" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">2. 本机 Codex thread 导入与恢复</text>
    <text x="38" y="440" fill="#334155" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">3. 手机端状态、消息流和授权同步</text>

    <rect x="38" y="470" width="342" height="2" fill="#E2E8F0"/>
    <text x="38" y="514" fill="#64748B" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">你真正控制的是本地 Codex 会话，不是远端桌面窗口。</text>
  </g>

  <g transform="translate(1072 256)">
    <g filter="url(#card-shadow)">
      <rect width="394" height="210" rx="32" fill="url(#panel)"/>
      <text x="34" y="56" fill="#94A3B8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.14em">首选运行时</text>
      <text x="34" y="102" fill="#0F172A" font-size="32" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">Codex App Server</text>
      <text x="34" y="142" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">官方 WebSocket 协议链路</text>
      <text x="34" y="176" fill="#334155" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">thread/start · turn/start · turn/interrupt</text>
    </g>

    <g filter="url(#card-shadow)" transform="translate(0 252)">
      <rect width="394" height="180" rx="32" fill="url(#panel)"/>
      <text x="34" y="56" fill="#94A3B8" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.14em">兜底运行时</text>
      <text x="34" y="102" fill="#0F172A" font-size="32" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">CLI Fallback</text>
      <text x="34" y="142" fill="#475569" font-size="20" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">codex exec --json / resume --json</text>
    </g>
  </g>

  <path d="M460 512H522" stroke="#1E293B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M984 360H1040" stroke="#1E293B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M984 610H1040" stroke="#1E293B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(110 806)">
    <rect width="248" height="52" rx="26" fill="#0F172A"/>
    <text x="28" y="33" fill="#F8FAFC" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">本地优先</text>
    <text x="106" y="33" fill="#CBD5E1" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">代码不离开电脑</text>
  </g>
  <g transform="translate(382 806)">
    <rect width="272" height="52" rx="26" fill="#FFFFFF" fill-opacity="0.82"/>
    <text x="28" y="33" fill="#0F172A" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">同 thread 继续</text>
    <text x="156" y="33" fill="#64748B" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">而不是新建机器人</text>
  </g>
  <g transform="translate(678 806)">
    <rect width="274" height="52" rx="26" fill="#FFFFFF" fill-opacity="0.82"/>
    <text x="28" y="33" fill="#0F172A" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700">适合 4G</text>
    <text x="98" y="33" fill="#64748B" font-size="18" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">只传高价值状态</text>
  </g>
</svg>
